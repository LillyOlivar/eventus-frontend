<!-- src/app/features/auth/login/login.component.html -->
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Eventus</h1>
      <p>Plataforma de Eventos Académicos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo institucional</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="usuario@unicauca.edu.co"
          [class.error]="isFieldInvalid('email')"
        />
        @if (isFieldInvalid('email')) {
          <span class="error-msg">Ingresa un correo válido</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.error]="isFieldInvalid('password')"
        />
        @if (isFieldInvalid('password')) {
          <span class="error-msg">Contraseña requerida (mín. 8 caracteres)</span>
        }
      </div>

      @if (errorMessage) {
        <div class="alert alert-error">{{ errorMessage }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
    </p>
  </div>
</div>
